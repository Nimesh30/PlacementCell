<div class="modal-backdrop">
  <div class="modal-container">

    <h2>Apply to TCS</h2>
    <p class="role">Systems Engineer</p>

    <div class="auto-fill">
      ✓ AUTO-FILLED FROM YOUR PROFILE
    </div>

    <div class="grid">
      <div class="card">
        <label>Name</label>
        <p>{{student.name}}</p>
      </div>

      <div class="card">
        <label>Student ID</label>
        <p>{{student.studentId}}</p>
      </div>

      <div class="card">
        <label>College Email</label>
        <p>{{student.email}}</p>
      </div>

      <div class="card">
        <label>Mobile</label>
        <p>{{student.mobile}}</p>
      </div>

      <div class="card">
        <label>CGPA</label>
        <p>{{student.cgpa}}</p>
      </div>

      <div class="card">
        <label>Department</label>
        <p>{{student.department}}</p>
      </div>
    </div>

    <div class="actions">
      <button class="cancel" (click)="close.emit()">Cancel</button>
     <button class="submit" (click)="submitApplication()">Submit Application</button>
    </div>

  </div>
</div>
