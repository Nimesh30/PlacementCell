<div class="app-container">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <div>
        <h2>PlacePro</h2>
        <p>Student Portal</p>
      </div>
    </div>

    <nav>
      <a routerLink="userdashboard" routerLinkActive="active"><span>🏠</span> Dashboard</a>
      <a routerLink="myprofile" routerLinkActive="active"><span>👤</span> My Profile</a>
      <a routerLink="jobs" routerLinkActive="active"><span>💼</span> Job Listings</a>
      <a routerLink="applications" routerLinkActive="active"><span>📖</span> My Applications</a>
      <a routerLink="notice" routerLinkActive="active"><span>🔔</span> Notice Board</a>
      <!-- <button class="logout-btn" (click)="logout()">
        Logout
      </button> -->
    </nav>  

    <div class="user-footer">

      <div class="user-info">
        <div class="avatar">🧑🏻‍🎓</div>
    
        <div class="user-text">
          <strong>{{username}}</strong>
          <p>Student</p>
        </div>
      </div>
  
      <button class="logout-btn" (click)="logout()">
        Logout
      </button>
    
    </div>
  </aside>

  <!-- THIS IS THE IMPORTANT PART -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
