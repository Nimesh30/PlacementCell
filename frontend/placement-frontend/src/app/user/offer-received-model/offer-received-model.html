<div class="overlay" (click)="close()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <h2>Your Offers</h2>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    @if (offers().length > 0) {

      <div class="offer-card">
    
        <div class="left">
          <div class="icon">🏢</div>
    
          <div class="info">
            <h3>{{ offers()[0].companyName }}</h3>
            <p>{{ offers()[0].jobTitle }}</p>
    
            <div class="details">
              <span>₹ {{ offers()[0].packageLpa }} LPA</span>
              <span>📍 {{ offers()[0].location }}</span>
            </div>
          </div>
        </div>
    
        <div class="status">
          ⏳ {{ offers()[0].studentResponse }}
        </div>
      </div>
    
      <div class="actions">
        <button class="accept" (click)="acceptOffer(offers()[0])">
          ✔ Accept Offer
        </button>
    
        <button class="decline" (click)="declineOffer(offers()[0])">
          ✖ Decline
        </button>
      </div>
    
    }

    <!-- ✅ If no offers -->
    @if (offers().length === 0) {
      <p style="text-align:center; margin-top:20px;">
        No offers available
      </p>
    }

  </div>
</div>
